<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 — 数据质量监控平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: #fff; border-radius: 8px; padding: 40px; width: 380px; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
        .login-card h2 { text-align: center; margin-bottom: 8px; color: #333; }
        .login-card .subtitle { text-align: center; color: #999; font-size: 13px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 4px; color: #666; font-size: 13px; }
        .form-group input { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #52c41a; }
        .btn-login { width: 100%; padding: 10px; background: #52c41a; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
        .btn-login:hover { background: #45a818; }
        .error { background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; padding: 10px 16px; border-radius: 4px; margin-bottom: 16px; font-size: 13px; text-align: center; }
        .hint { text-align: center; color: #bbb; font-size: 12px; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>数据质量监控平台</h2>
        <p class="subtitle">Data Quality Monitor</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="admin123" required>
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>
        <p class="hint">演示账号：admin / admin123</p>
    </div>
</body>
</html>
