<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数据质量监控平台</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: #001529; color: #fff; padding: 20px 0; flex-shrink: 0; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; font-size: 18px; color: #52c41a; }
        .sidebar a { display: block; color: #ccc; text-decoration: none; padding: 12px 24px; font-size: 14px; }
        .sidebar a:hover, .sidebar a.active { background: #52c41a; color: #fff; }
        .sidebar .user-info { padding: 12px 24px; color: #999; font-size: 12px; margin-top: 40px; border-top: 1px solid #333; }
        .main { flex: 1; padding: 24px; overflow-y: auto; }
        .card { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        .card h3 { margin-bottom: 16px; color: #333; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; color: #666; font-weight: 600; }
        tr:hover { background: #f5f5f5; }
        .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .btn-blue { background: #1890ff; color: #fff; }
        .btn-blue:hover { background: #1677cc; }
        .btn-green { background: #52c41a; color: #fff; }
        .btn-green:hover { background: #45a818; }
        .btn-orange { background: #fa8c16; color: #fff; }
        .btn-orange:hover { background: #e07a10; }
        .btn-red { background: #ff4d4f; color: #fff; }
        .btn-red:hover { background: #e04040; }
        .stat-grid { display: flex; gap: 16px; }
        .stat-card { flex:1; background:#fff; border-radius:8px; padding:20px; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.1); }
        .stat-card .num { font-size: 32px; font-weight: bold; }
        .stat-card .label { font-size: 13px; color: #999; margin-top: 6px; }
        .stat-card.green .num { color: #52c41a; }
        .stat-card.red .num { color: #ff4d4f; }
        .stat-card.blue .num { color: #1890ff; }
        .stat-card.orange .num { color: #fa8c16; }
        .charts-row { display: flex; gap: 20px; }
        .charts-row .chart-box { flex: 1; min-width: 0; height: 350px; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .tag-critical { background: #fff1f0; color: #ff4d4f; border: 1px solid #ffa39e; }
        .tag-warning { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
        .tag-info { background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; }
        .tag-pass { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .tag-fail { background: #fff1f0; color: #ff4d4f; border: 1px solid #ffa39e; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #fff; border-radius: 8px; padding: 24px; width: 700px; max-height: 80vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 16px; }
        .flash-error { background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; padding: 10px 16px; border-radius: 4px; margin-bottom: 16px; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>数据质量监控</h2>
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">📊 质量看板</a>
        <a href="/rules" class="{% if request.path == '/rules' %}active{% endif %}">📋 规则管理</a>
        <div class="user-info">
            当前用户：admin<br>
            <a href="/logout" style="color:#ff4d4f; padding:0; display:inline;">退出登录</a>
        </div>
    </div>
    <div class="main">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
